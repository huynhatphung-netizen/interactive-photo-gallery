<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="image">
        Hover over an image below to display here.
    </div>

    <div class="preview-container">
        <img class="preview" alt="Cánh đồng hoa hướng dương rực rỡ" src="https://images.unsplash.com/photo-1597848212624-a19eb35e2651?w=500" onmouseover="upDate(this)" onmouseout="undo()">
        <img class="preview" alt="Ngọn núi phủ tuyết trắng xóa" src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500" onmouseover="upDate(this)" onmouseout="undo()">
        <img class="preview" alt="Bãi biển hoàng hôn thơ mộng" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500" onmouseover="upDate(this)" onmouseout="undo()">
    </div>

    <script src="script.js"></script>
</body>
</html>
