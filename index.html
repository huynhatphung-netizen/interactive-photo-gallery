<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Preferences and Responsive Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Personalized Responsive Gallery</h1>
    </header>

    <main class="grid-container">
        <figure>
            <img src="https://images.unsplash.com/photo-1597848212624-a19eb35e2651?w=500" alt="Bright yellow sunflower head facing the sun">
            <figcaption>Sunflowers bring vibrant energy and symbolize loyalty and longevity in various cultures.</figcaption>
        </figure>

        <figure>
            <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500" alt="Snow covered mountain peaks under a clear blue sky">
            <figcaption>Majestic mountains offer a silent, breathtaking escape into nature's grandest architecture.</figcaption>
        </figure>

        <figure>
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500" alt="Calm ocean waves hitting a sandy beach during a golden sunset">
            <figcaption>The gentle rhythm of ocean waves during sunset creates a peaceful environment for relaxation.</figcaption>
        </figure>

        <figure>
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=500" alt="Sunlight filtering through tall green trees in a dense forest">
            <figcaption>Walking through a dense forest allows you to reconnect with the earth and clear your mind.</figcaption>
        </figure>

        <figure>
            <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=500" alt="Skyscrapers illuminated with neon lights in a modern city at night">
            <figcaption>Urban landscapes come alive at night, glowing with countless lights and dynamic energy.</figcaption>
        </figure>

        <figure>
            <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=500" alt="Close up shot of a cute kitten looking directly at the camera">
            <figcaption>Domestic pets provide unconditional companionship and endless moments of joy in daily life.</figcaption>
        </figure>
    </main>

    <footer>
        <p>&copy; 2026 Interactive Web Design Project</p>
    </footer>

</body>
</html>
